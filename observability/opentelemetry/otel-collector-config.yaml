apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-conf
  namespace: observability
  labels:
    app: opentelemetry
    component: otel-collector-conf
data:
  otel-collector-config.yaml: |
    receivers:
      filelog:
        include:
          # Only collect logs from TeaStore pods
          - /var/log/pods/*teastore*/*/*.log
        exclude:
          # Exclude collector's own logs to prevent feedback loops
          - /var/log/pods/*otel-collector*/*.log
        start_at: end
        include_file_path: true
        include_file_name: false

      hostmetrics:
        collection_interval: 30s
        scrapers:
          cpu:
          memory:
          network:
          load:
          filesystem:

      kubeletstats:
        collection_interval: 20s
        auth_type: "serviceAccount"
        endpoint: "${env:K8S_NODE_NAME}:10250"
        insecure_skip_verify: true


    processors:
      transform:
        error_mode: ignore
        log_statements:
          - context: log
            statements:
              - set(attributes["filename"], attributes["log.file.path"])
              - set(attributes["loki.attribute.labels"], "filename")
      batch:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 70
        spike_limit_percentage: 30


    exporters:
      loki:
        endpoint: "http://loki:3100/loki/api/v1/push"
        default_labels_enabled:
          exporter: true
          job: true
          instance: true
          level: true
      prometheus:
        endpoint: "0.0.0.0:8889"
        resource_to_telemetry_conversion:
          enabled: true

    service:
      pipelines:
        logs:
          receivers: [filelog]
          processors: [memory_limiter, transform]
          exporters: [loki]
        metrics:
          receivers: [hostmetrics, kubeletstats]
          processors: [memory_limiter, batch]
          exporters: [prometheus]
