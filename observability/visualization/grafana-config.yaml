            "includeAll": true,
            "allValue": ".+",
            "label": "Service",
            "multi": true,
            "name": "Service",
            "options": [],
            "query": "label_values(filename)",
            "refresh": 1,
            "regex": "/.*\\/([a-zA-Z0-9-]+)\\/[0-9]+\\.log/",
            "skipUrlSync": false,
            "sort": 1,
            "tagValuesQuery": "",
