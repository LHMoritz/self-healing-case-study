apiVersion: instana.io/v1
kind: InstanaAgent
metadata:
  name: instana-agent
  namespace: instana-agent
spec:
  zone:
   name: Europe # (optional) name of the zone of the host
  cluster:
   name: <YOUR_CLUSTER_NAME>
  agent:
   key: <key>
   downloadKey: <key>
   endpointHost: ingress-blue-saas.instana.io
   endpointPort: "443"
   env: {}
   configuration_yaml: |
    # You can leave this empty, or use this to configure your instana agent.
    # See https://ibm.biz/K8s-agent-administer